subreddits:
  - wallstreetbets
  - stocks
  - investing
include_comments: true
lookback_hours: 24
report_output_dir: reports/test_run
database_path: data/test_pipeline.db
stock_universe_path: data/us_stock_universe.csv
anomaly_baseline_window_days: 30
shortlist:
  min_mentions: 1
  min_unique_authors: 1
  anomaly_score_threshold: 0.1
market_data:
  price_windows:
    - 1
    - 3
    - 5
  provider: mock
llm:
  enabled: false
  provider: mock
  model: placeholder-model
  max_items_per_run: 10
  api_key_env_var: OPENAI_API_KEY
  base_url:
  system_prompt: |
    You are classifying Reddit discussion about US-listed stocks for a human analyst.
    Distinguish between early attention, post-price-move chatter, pump-like behavior,
    and thesis-driven discussion. Do not give investment advice.
  max_input_chars: 6000
logging:
  level: INFO
  json: false
